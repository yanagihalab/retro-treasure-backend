<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RELIC RAID - カード図鑑</title>
    <link
      rel="stylesheet"
      href="/static/css/style.css?v=relic-boss-drops-deck-icons-20260630"
    />
  </head>
  <body data-page="encyclopedia">
    <div class="device-shell">
      <div class="device-top">RELIC RAID</div>
      <div class="screen-frame">
        <div class="statusbar">
          <div>◢◣◢ GREMOBA+</div>
          <div id="clockText">--:--</div>
          <div>[||||]</div>
        </div>
        <div class="shell">
          <a class="page-back" href="/static/index.html" aria-label="戻る"
            >＜</a
          >
          <header class="hero">
            <div>
              <p class="eyebrow">カード図鑑</p>
              <h1>Archive</h1>
              <p class="subcopy">心・技・体の防災カードを記録</p>
            </div>
            <div id="authBadge" class="badge hidden">未ログイン</div>
          </header>
          <main class="grid">
            <section id="gameView">
              <nav class="app-nav" aria-label="ゲームメニュー">
                <a class="page-tab" data-route="home" href="/static/index.html"
                  >ホーム</a
                >
                <a
                  class="page-tab"
                  data-route="mypage"
                  href="/static/mypage.html"
                  >マイページ</a
                >
                <a class="page-tab" data-route="deck" href="/static/deck.html"
                  >デッキ</a
                >
                <a class="page-tab" data-route="boss" href="/static/boss.html"
                  >ボス</a
                >
              </nav>
              <div class="page-view active" data-page="encyclopedia">
                <section class="panel">
                  <div class="panel-head between">
                    <h2>カード図鑑</h2>
                    <button id="reloadEncyclopediaBtn" class="ghost">
                      再読込
                    </button>
                  </div>
                  <div class="archive-summary">
                    <p id="encyclopediaRate" class="completion">達成率: -</p>
                    <div
                      class="archive-filters"
                      role="group"
                      aria-label="属性フィルタ"
                    >
                      <button
                        class="archive-filter active"
                        data-card-filter="all"
                      >
                        ALL
                      </button>
                      <button class="archive-filter" data-card-filter="heart">
                        心
                      </button>
                      <button class="archive-filter" data-card-filter="tech">
                        技
                      </button>
                      <button class="archive-filter" data-card-filter="body">
                        体
                      </button>
                      <button class="archive-filter" data-card-filter="owned">
                        所持
                      </button>
                      <button class="archive-filter" data-card-filter="missing">
                        未所持
                      </button>
                    </div>
                  </div>
                  <div id="encyclopediaList" class="card-archive-grid muted">
                    読み込み中...
                  </div>
                </section>
              </div>
            </section>
          </main>
        </div>
        <div id="loadingOverlay" class="loading-overlay hidden">
          <div class="loading-box">
            <div class="loading-title">通信中...</div>
            <div class="loading-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
        <div
          id="cardPreviewOverlay"
          class="card-preview-overlay hidden"
          aria-hidden="true"
        >
          <div
            class="card-preview-dialog"
            role="dialog"
            aria-modal="true"
            aria-labelledby="cardPreviewName"
          >
            <button
              id="closeCardPreviewBtn"
              class="card-preview-close"
              type="button"
              aria-label="閉じる"
            >
              ×
            </button>
            <div class="card-preview-art">
              <img id="cardPreviewImage" src="" alt="" />
              <span id="cardPreviewStatus" class="card-preview-status"></span>
            </div>
            <div class="card-preview-info">
              <div class="card-preview-kicker" id="cardPreviewElement">-</div>
              <h2 id="cardPreviewName">カード</h2>
              <div class="card-preview-stars" id="cardPreviewRarity"></div>
              <div class="card-preview-stats">
                <span id="cardPreviewHP">HP -</span>
                <span id="cardPreviewATK">ATK -</span>
                <span id="cardPreviewDEF">DEF -</span>
              </div>
              <p id="cardPreviewDescription"></p>
              <div class="card-preview-skills" id="cardPreviewSkills"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="device-bottom">
        <div class="keypad-row">
          <span>◀</span><span>決定</span><span>▶</span>
        </div>
      </div>
    </div>
    <div id="toast" class="toast hidden"></div>
    <script src="/static/js/transitions.js?v=relic-boss-drops-deck-icons-20260630"></script>
    <script src="/static/js/app.js?v=relic-boss-drops-deck-icons-20260630"></script>
  </body>
</html>
